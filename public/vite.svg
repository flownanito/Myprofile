<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background with premium radial gradient matching primary-dark -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#01223f" />
      <stop offset="100%" stop-color="#010c15" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Border -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)" stroke="#1E2D3D" stroke-width="4"/>
  
  <!-- Sleek inner border accent -->
  <rect x="5" y="5" width="90" height="90" rx="17" fill="none" stroke="#1E2D3D" stroke-width="1" stroke-dasharray="4 2" opacity="0.5"/>
  
  <!-- Brand logo: _ns -->
  <g transform="translate(14, 18)" filter="url(#glow)">
    <!-- Underscore '_' in green accent -->
    <rect x="2" y="44" width="16" height="5" rx="1.5" fill="#43D9AD" />
    
    <!-- Letter 'n' in orange accent -->
    <path d="M 28,49 L 28,26 M 28,33 C 28,21 42,21 42,32 L 42,49" stroke="#E99287" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Letter 's' in orange accent -->
    <path d="M 52,44 C 52,50 64,50 64,44 C 64,39 52,38 52,32 C 52,26 64,26 64,32" stroke="#E99287" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>